# karst_survey_config.yml
#
# Recommended model complexity:
#   Use 5 layers for the first serious survey-design runs:
#     1. very shallow loose soil / fill
#     2. weathered sand / regolith
#     3. weathered limestone / epikarst
#     4. competent limestone
#     5. deeper limestone
#
# This is complex enough to create realistic near-surface refraction and
# scattering, but not so complex that it becomes unidentifiable from one line.

compute:
  # null means use all available CPU cores.
  # Deepwave scalar does not currently use Apple MPS for this kernel.
  num_threads: null

output:
  dir: deepwave_karst_layered_output
  write_mseed: true
  network: SY
  channel: BHZ
  starttime: "2026-01-01T00:00:00"

domain:
  x_min_m: -30.0
  x_max_m: 170.0
  z_min_m: 0.0
  z_max_m: 55.0

deepwave:
  dx_m: 0.25
  dt_s: 0.00010
  nt: 4000
  source_frequency_hz: 60.0
  accuracy: 6
  pml_width: 30

survey:
  smartsolo:
    n_nodes: 36
    spacing_m: 4.0
    start_m: 0.0
    receiver_depth_m: 1.0

  shots:
    # Good refraction design:
    #   - off-end shots help constrain deeper refractors
    #   - node shots improve reciprocal coverage
    #   - far shots increase long-offset coverage
    include_node_shots: true
    source_depth_m: 1.0
    extra_shots_m: [-24.0, -16.0, -8.0, 148.0, 156.0, 164.0]

    # Optional additional regular shots. Set to null to disable.
    regular_spacing_m: null
    regular_start_m: 0.0
    regular_end_m: 140.0

  cabled:
    enabled: true
    n_channels: 48
    spacing_m: 1.0
    # Rolling dense spreads, 1 m spacing over ~47 m, overlapping.
    spread_starts_m: [0.0, 23.0, 46.0, 69.0, 92.0]

earth_model:
  background:
    vp_m_s: 2500.0
    density_kg_m3: 2200.0

  # 5-layer starting model. Adjust after hammer refraction/MASW tests.
  layers:
    - name: loose_surface_soil
      z_min_m: 0.0
      z_max_m: 1.5
      vp_m_s: 450.0
      density_kg_m3: 1700.0

    - name: sand_unsaturated_regolith
      z_min_m: 1.5
      z_max_m: 5.0
      vp_m_s: 800.0
      density_kg_m3: 1800.0

    - name: weathered_limestone_epikarst
      z_min_m: 5.0
      z_max_m: 12.0
      vp_m_s: 1500.0
      density_kg_m3: 2000.0

    - name: competent_limestone_upper
      z_min_m: 12.0
      z_max_m: 30.0
      vp_m_s: 2600.0
      density_kg_m3: 2250.0

    - name: competent_limestone_lower
      z_min_m: 30.0
      z_max_m: 100.0
      vp_m_s: 3200.0
      density_kg_m3: 2350.0

  gradient:
    enabled: true
    z0_m: 12.0
    vp_gradient_m_s_per_m: 10.0

cave:
  # Water-filled cave target.
  # These are the key parameters to vary in sensitivity tests.
  centre_x_m: 70.0
  centre_depth_m: 18.0
  diameter_m: 6.0

  water:
    # Approximate fresh-water P-wave velocity and density.
    vp_m_s: 1480.0
    density_kg_m3: 1000.0
