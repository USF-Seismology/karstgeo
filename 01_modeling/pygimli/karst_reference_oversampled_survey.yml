compute:
  num_threads: null
output:
  dir: karst_reference_oversampled_output
  write_mseed: true
  network: SY
  channel: BHZ
  starttime: '2026-01-01T00:00:00'
domain:
  x_min_m: -225.0
  x_max_m: 225.0
  z_min_m: 0.0
  z_max_m: 80.0
deepwave:
  dx_m: 0.25
  dt_s: 0.0001
  nt: 4000
  source_frequency_hz: 60.0
  accuracy: 6
  pml_width: 30
survey:
  shots:
    include_node_shots: false
    source_depth_m: 0.05
    extra_shots_m: []
    regular_spacing_m: 1.0
    regular_start_m: -150.0
    regular_end_m: 150.0
    description: Oversampled reference shot line centred on the expected cave centre.
      Shot positions are -150, -149, ..., 0, ..., +149, +150 m.
  cabled:
    enabled: true
    n_channels: 561
    spacing_m: 0.5
    start_m: -140.0
    receiver_depth_m: 0.12
    description: Oversampled reference receiver line centred on the expected cave
      centre. Receiver positions are -140, -139.5, ..., 0, ..., +139.5, +140 m.
  smartsolo:
    enabled: false
    n_nodes: 36
    spacing_m: 4.0
    start_m: -70.0
    receiver_depth_m: 1.0
    description: Not modelled separately in the oversampled reference survey. Equivalent
      to selecting every 4th receiver from the 1 m cabled array over approximately
      -70 to +70 m.      
earth_model:
  background:
    vp_m_s: 3600.0
    vs_m_s: 1900.0
    density_kg_m3: 2350.0

  layers:
  - name: unsaturated_limestone
    z_min_m: 0.0
    z_max_m: 10.0
    vp_top_m_s: 1600.0
    vp_bottom_m_s: 1600.0
    vs_top_m_s: 800.0
    vs_bottom_m_s: 800.0
    density_top_kg_m3: 2050.0
    density_bottom_kg_m3: 2050.0
    qkappa: 60
    qmu: 25

  - name: saturated_limestone_upper
    z_min_m: 10.0
    z_max_m: 35.0
    vp_top_m_s: 3600.0
    vp_bottom_m_s: 3600.0
    vs_top_m_s: 1800.0
    vs_bottom_m_s: 1800.0
    density_top_kg_m3: 2280.0
    density_bottom_kg_m3: 2280.0
    qkappa: 100
    qmu: 40

  - name: saturated_limestone_lower_or_basement
    z_min_m: 35.0
    z_max_m: 50.0
    vp_top_m_s: 4700.0
    vp_bottom_m_s: 4700.0
    vs_top_m_s: 2600.0
    vs_bottom_m_s: 2600.0
    density_top_kg_m3: 2450.0
    density_bottom_kg_m3: 2450.0
    qkappa: 150
    qmu: 60

  gradient:
    enabled: false
    style: linear_by_layer
    description: >
      Each layer may be assigned either constant vp_m_s/vs_m_s/density_kg_m3
      or top/bottom values. If top/bottom values are present, properties are
      linearly interpolated with depth within that layer.
cave: # model C
  geometry: rectangle
  x_min_m: -10.0
  x_max_m: 10.0
  z_min_m: 15.0
  z_max_m: 25.0
  water:
    vp_m_s: 1500.0
    vs_m_s: 0.0
    density_kg_m3: 1000.0
    qkappa: 9999
    qmu: 9999
  description: Water-filled rectangular cave centred at x=0 m, with top at 15 m depth
    and bottom at 25 m depth. But now dimensions made larger, and cave assumed to be partially saturated.
coordinate_convention:
  x_m: horizontal distance along survey line; x=0 is expected cave centre
  z_m: positive depth below ground surface
  array_center_x_m: 0.0
  cave_center_x_m: 0.0
pygimli:
  mesh_quality: 34.0
  mesh_area_m2: 0.5
  cave_mesh_area_m2: 0.5
  cave_buffer_m: 10.0
  cave_buffer_mesh_area_m2: 0.5
  #noise_level_relative: 0.001
  #noise_abs_s: 0.0005
  #error_relative: 0.03
  #error_abs_s: 0.001
  noise_level_relative: 0.001
  noise_abs_s: 0.0001
  error_relative: 0.001
  error_abs_s: 0.0001
  seed: 20260424
  use_cabled_receivers: true
  use_smartsolo_receivers: false
  use_extra_shots: false
  use_node_shots: false
  use_regular_shots: true
  inversion:
    run: true
    sec_nodes: 2
    para_max_cell_size_m2: 5.0
    max_iter: 8
    lam: 50.0
  decimation_experiments:
    receiver_spacings_m:
    - 0.5
    - 1
    - 2
    - 3
    - 4
    - 5
    - 10
    shot_spacings_m:
    - 1
    - 2
    - 4
    - 5
    - 10
    receiver_halfwidths_m:
    - 25
    - 35
    - 50
    - 75
    - 100
    - 150
    shot_halfwidths_m:
    - 40
    - 60
    - 80
    - 100
    - 150
    description: Generate the full 1 m shot/receiver travel-time table first, then
      subset by shot spacing, receiver spacing, and aperture for survey-design tests.
